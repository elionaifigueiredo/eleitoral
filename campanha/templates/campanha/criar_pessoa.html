{% extends "base.html" %}

{% block content %}

<div class="card shadow">
    <div class="card-header">
        <h4>👥 Nova Pessoa</h4>
    </div>

    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <!-- DADOS BÁSICOS -->
            <h5 class="mb-3">📌 Dados Básicos</h5>

            <div class="mb-3">
                <label>Nome</label>
                <input type="text" name="nome" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Telefone</label>
                <input type="text" id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-0000">
            </div>

            <hr>

            <!-- DOCUMENTOS -->
            <h5 class="mb-3">📄 Documentos</h5>

            <div class="mb-3">
                <label>CPF</label>
                <input type="text" id="cpf" name="cpf" class="form-control" placeholder="000.000.000-00">
            </div>

            <div class="mb-3">
                <label>RG</label>
                <input type="text" name="rg" class="form-control">
            </div>

            <div class="mb-3">
                <label>Título de Eleitor</label>
                <input type="text" name="titulo_eleitor" class="form-control">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Zona</label>
                    <input type="number" name="zona" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Seção</label>
                    <input type="number" name="secao" class="form-control">
                </div>
            </div>

            <hr>

            <!-- INFO AUTOMÁTICA -->
            <h5 class="mb-3">🕒 Cadastro</h5>

            <div class="mb-3">
                <label>Data de Cadastro</label>
                <input type="text" class="form-control" value="Será gerada automaticamente" disabled>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success">Salvar</button>
                <a href="/pessoas/" class="btn btn-secondary">Voltar</a>
            </div>

        </form>
{% if is_admin %}
<hr>

<h5 class="mb-3">📍 Localização</h5>

<div class="mb-3">
    <label>Bairro</label>
    <select name="bairro" class="form-control">
        {% for b in bairros %}
            <option value="{{ b.id }}">{{ b.nome }}</option>
        {% endfor %}
    </select>
</div>

<div class="mb-3">
    <label>Líder</label>
    <select name="lider" class="form-control">
        {% for l in lideres %}
            <option value="{{ l.id }}">{{ l.nome_completo }}</option>
        {% endfor %}
    </select>
</div>
{% endif %}
    </div>
</div>

<!-- JS MÁSCARAS -->
<script>
    // CPF máscara
    document.getElementById('cpf').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');

        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

        e.target.value = v;
    });

    // Telefone máscara
    document.getElementById('telefone').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');

        v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
        v = v.replace(/(\d{5})(\d)/, '$1-$2');

        e.target.value = v;
    });
</script>

{% endblock %}
