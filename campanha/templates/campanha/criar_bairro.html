{% extends "base.html" %}

{% block content %}

<div class="card shadow">
    <div class="card-header">
        <h4>Novo Bairro</h4>
    </div>

    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Nome do Bairro</label>
                <input type="text" name="nome" class="form-control" required>
            </div>

            <button class="btn btn-success">Salvar</button>
            <a href="/bairros/" class="btn btn-secondary">Voltar</a>

        </form>

    </div>
</div>

{% endblock %}
